        model:
          completion_params:
            temperature: 0.1
          mode: chat
          name: gemini-2.5-pro
          provider: langgenius/gemini/google
        prompt_template:
        - id: 1322af7f-5a4f-4fe1-8a89-20affc221cba
          role: system
          text: 'You are a Korean news article analyzer.

            Analyze each article and return results in JSON format.

            The response must be a valid JSON object containing the key "results".

            You must respond ONLY with a valid JSON object.

            Do not include any explanation, markdown, or text outside the JSON.

            The word "json" is included in this prompt for format compliance.'
        - id: 86c0393a-14e1-4dd9-ab41-e3d2b209e94a
          role: user
          text: "아래 기사 목록을 분석해서 각 기사의 감성과 홍보성 여부를 판단해줘.\n\n기사 목록: {{#1779271952776.articles_validated#}}\n\
            \n각 기사에 대해 다음 기준으로 분석해:\n\n[감성 분석 기준 - sentiment]\n- \"긍정\": 기사 전체 논조가\
            \ 긍정적 (성장, 성과, 호재 등)\n- \"부정\": 기사 전체 논조가 부정적 (하락, 사고, 악재 등)\n- \"중립\"\
            : 사실 전달 위주이거나 논조가 혼재\n\n[홍보성 분류 기준 - is_promotion]\n- true: 특정 제품/서비스/기업\
            \ 홍보가 주목적인 보도자료성 기사\n- false: 독립적 취재 또는 사실 보도 기사\n\n반드시 아래 JSON 형식으로만\
            \ 응답해:\n{\n  \"results\": [\n    {\n      \"article_id\": 101,\n     \
            \ \"sentiment\": \"중립\",\n      \"is_promotion\": false\n    },\n    {\n\
            \      \"article_id\": 102,\n      \"sentiment\": \"긍정\",\n      \"is_promotion\"\
            : true\n    }\n  ]\n}"
        selected: false
        title: LLM
        type: llm
        vision:
          enabled: false
      height: 87
      id: '1779271958329'
      position:
        x: 682
        y: 282
      positionAbsolute:
        x: 682
