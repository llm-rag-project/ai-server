      targetPosition: left
      type: custom
      width: 241
    - data:
        code: "import json\nimport re\n\ndef main(arg1: str) -> dict:\n    text =\
          \ arg1.strip()\n    \n    # 리터럴 \\n 을 실제 줄바꿈으로 변환\n    text = text.replace('\\\
          \\n', '\\n')\n    \n    # 마크다운 펜스 제거\n    text = re.sub(r'```json|```',\
          \ '', text).strip()\n    \n    # JSON 블록 추출\n    match = re.search(r'\\\
          {.*\\}', text, re.DOTALL)\n    if not match:\n        return {\"results\"\
          : \"[]\"}\n    \n    try:\n        parsed = json.loads(match.group())\n\
          \    except json.JSONDecodeError:\n        return {\"results\": \"[]\"}\n\
          \    \n    results_raw = (\n        parsed.get(\"results\") or\n       \
          \ parsed.get(\"결과\") or\n        []\n    )\n    \n    results = []\n   \
          \ for item in results_raw:\n        article_id = (\n            item.get(\"\
          article_id\") or\n            item.get(\"기사id\") or\n            item.get(\"\
          기사_id\")\n        )\n        \n        sentiment = (\n            item.get(\"\
          sentiment\") or\n            item.get(\"감성\") or\n            \"분석실패\"\n\
          \        )\n        if sentiment not in [\"긍정\", \"부정\", \"중립\"]:\n    \
          \        sentiment = \"분석실패\"\n        \n        is_promotion = item.get(\"\
          is_promotion\")\n        if is_promotion is None:\n            is_promotion\
          \ = item.get(\"홍보성\")\n        if is_promotion is not None:\n          \
          \  is_promotion = bool(is_promotion)\n        \n        if article_id is\
          \ not None:\n            results.append({\n                \"article_id\"\
          : article_id,\n                \"sentiment\": sentiment,\n             \
          \   \"is_promotion\": is_promotion\n            })\n    \n    return {\"\
          results\": json.dumps(results, ensure_ascii=False)}"
        code_language: python3
        outputs:
          results:
            children: null
            type: string
        selected: false
        title: 코드
        type: code
        variables:
